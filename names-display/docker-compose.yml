services:
  names-display:
    build:
      context: ..
      dockerfile: names-display/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - INVALIDATED_NAMES
    restart: unless-stopped
    healthcheck:
      test: [
        "CMD",
        "wget",
        "--quiet",
        "--tries=1",
        "--spider",
        "http://localhost:3000/test@iota/1234567890",
      ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
