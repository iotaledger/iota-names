services:
  iota-names-indexer:
    container_name: iota-names-indexer
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - GIT_REVISION
        - BUILD_DATE
        - PROFILE=release
    image: iota-names-indexer:dev
    ports:
      - "9189:9189/tcp" # Metrics
      - 3030:3030 # Auction REST API
    tty: true
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - indexer-metrics-net
    volumes:
      - indexer_progress:/data
    environment:
      - RUST_LOG=info,iota_names_indexer=debug,iota_data_ingestion_core=warn
      - IOTA_NAMES_PACKAGE_ADDRESS=${IOTA_NAMES_PACKAGE_ADDRESS}
      - IOTA_NAMES_OBJECT_ID=${IOTA_NAMES_OBJECT_ID}
      - IOTA_NAMES_PAYMENTS_PACKAGE_ADDRESS=${IOTA_NAMES_PAYMENTS_PACKAGE_ADDRESS}
      - IOTA_NAMES_REGISTRY_ID=${IOTA_NAMES_REGISTRY_ID}
      - IOTA_NAMES_REVERSE_REGISTRY_ID=${IOTA_NAMES_REVERSE_REGISTRY_ID}
      - IOTA_NAMES_AUCTION_PACKAGE_ADDRESS=${IOTA_NAMES_AUCTION_PACKAGE_ADDRESS}
      - IOTA_NAMES_COUPONS_PACKAGE_ADDRESS=${IOTA_NAMES_COUPONS_PACKAGE_ADDRESS}
      - IOTA_NAMES_SUBNAMES_PACKAGE_ADDRESS=${IOTA_NAMES_SUBNAMES_PACKAGE_ADDRESS}
      - IOTA_NAMES_TEMP_SUBNAME_PROXY_PACKAGE_ADDRESS=${IOTA_NAMES_TEMP_SUBNAME_PROXY_PACKAGE_ADDRESS}
      - IOTA_NAMES_AUCTION_HOUSE_OBJECT_ID=${IOTA_NAMES_AUCTION_HOUSE_OBJECT_ID}
      - EVENT_PACKAGE_IDS=${EVENT_PACKAGE_IDS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "start"
      - "--prometheus-url=http://prometheus:9090"
      - "--num-workers=10"
      # Localnet values:
      # - "--node-url=http://host.docker.internal:9000"
      # - "--checkpoint-url=http://host.docker.internal:9000"
      # Devnet values:
      # - "--node-url=https://api.devnet.iota.cafe"
      # - "--checkpoint-url=https://checkpoints.devnet.iota.cafe"
      # Testnet values:
      # - "--node-url=https://api.testnet.iota.cafe"
      # - "--checkpoint-url=https://checkpoints.testnet.iota.cafe"
      # Mainnet values:
      - "--node-url=https://api.mainnet.iota.cafe"
      - "--checkpoint-url=https://checkpoints.mainnet.iota.cafe"
      # - "--reset-metrics"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - 9090:9090
    command:
      # default Dockerfile CLI arguments
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # set data retention policy to 100 years
      - "--storage.tsdb.retention.time=100y"
    volumes:
      - prometheus_data:/prometheus
      - ./assets/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - indexer-metrics-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./assets/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./assets/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - indexer-metrics-net

volumes:
  prometheus_data:
  grafana_data:
  indexer_progress:

networks:
  indexer-metrics-net:
    driver: bridge
