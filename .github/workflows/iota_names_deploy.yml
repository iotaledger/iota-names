name: Deploy IOTA Names

on:
  workflow_dispatch:
    inputs:
      deploy_type:
        description: "Deploy type"
        required: true
        type: choice
        options:
          - staging
          - rc
          - prod
      network:
        description: "Network"
        required: true
        type: choice
        options:
          - devnet
          - testnet
          - mainnet
  push:
    branches: [develop]
    paths:
      - "dapp/**"
      - "sdk/**"
      - "scripts/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/iota_names_deploy.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.deploy_type || 'staging' }}-${{ github.event.inputs.network || 'devnet' }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event.inputs.deploy_type != 'prod' }}

jobs:
  resolve-deploy-type:
    runs-on: ubuntu-latest
    outputs:
      deploy_type: ${{ steps.resolve.outputs.deploy_type }}
      network: ${{ steps.resolve.outputs.network }}
      environment: ${{ steps.resolve.outputs.environment }}
      apps_backend_secret: ${{ steps.resolve.outputs.apps_backend_secret }}
      vercel_env: ${{ steps.resolve.outputs.vercel_env }}
      build_env: ${{ steps.resolve.outputs.build_env }}
      alias: ${{ steps.resolve.outputs.alias }}
    steps:
      - name: Resolve deploy type
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            DEPLOY_TYPE="staging"
            NETWORK="devnet"
          else
            DEPLOY_TYPE="${{ inputs.deploy_type }}"
            NETWORK="${{ inputs.network }}"
          fi

          [ "$NETWORK"      != "mainnet" ] && NETWORK_PREFIX="${NETWORK}-" || NETWORK_PREFIX=""
          [ "$DEPLOY_TYPE"  != "prod"    ] && DEPLOY_SUFFIX="-${DEPLOY_TYPE}" || DEPLOY_SUFFIX=""
          ALIAS="${NETWORK_PREFIX}iota-names${DEPLOY_SUFFIX}-iota1.vercel.app"

          case "$DEPLOY_TYPE" in
            staging)
              BUILD_ENV="staging"
              APPS_BACKEND_SECRET="STAGING_APPS_BACKEND"
              VERCEL_ENV="preview"
              case "$NETWORK" in
                devnet)  ENVIRONMENT="Staging devnet - names-dapp" ;;
                testnet) ENVIRONMENT="Staging testnet - names-dapp" ;;
                mainnet) ENVIRONMENT="Staging mainnet - names-dapp" ;;
              esac
              ;;
            rc)
              BUILD_ENV="production"
              APPS_BACKEND_SECRET="RC_APPS_BACKEND"
              VERCEL_ENV="preview"
              case "$NETWORK" in
                testnet) ENVIRONMENT="RC testnet - names-dapp" ;;
                mainnet) ENVIRONMENT="RC mainnet - names-dapp" ;;
              esac
              ;;
            prod)
              BUILD_ENV="production"
              APPS_BACKEND_SECRET="PROD_APPS_BACKEND"
              case "$NETWORK" in
                testnet)
                  ENVIRONMENT="Production testnet - names-dapp"
                  VERCEL_ENV="production-testnet"
                  ;;
                mainnet)
                  ENVIRONMENT="Production mainnet - names-dapp"
                  VERCEL_ENV="production"
                  ;;
              esac
              ;;
          esac

          echo "deploy_type=$DEPLOY_TYPE" >> "$GITHUB_OUTPUT"
          echo "network=$NETWORK" >> "$GITHUB_OUTPUT"
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "apps_backend_secret=$APPS_BACKEND_SECRET" >> "$GITHUB_OUTPUT"
          echo "vercel_env=$VERCEL_ENV" >> "$GITHUB_OUTPUT"
          echo "build_env=$BUILD_ENV" >> "$GITHUB_OUTPUT"
          echo "alias=$ALIAS" >> "$GITHUB_OUTPUT"

  deploy:
    needs: resolve-deploy-type
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-deploy-type.outputs.environment }}

    permissions:
      contents: read

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.IOTA_NAMES_VERCEL_PROJECT_ID }}
      SENTRY_AUTH_TOKEN: ${{ secrets.NAMES_DAPP_SENTRY_AUTH_TOKEN }}
      NEXT_PUBLIC_APPS_BACKEND: ${{ secrets[needs.resolve-deploy-type.outputs.apps_backend_secret] }}
      BUILD_ENV: ${{ needs.resolve-deploy-type.outputs.build_env }}
      NEXT_PUBLIC_NAMES_DAPP_CONFIG: ${{ secrets.NAMES_DAPP_CONFIG }}
      NEXT_PUBLIC_NAMES_DAPP_DEFAULT_NETWORK: ${{ needs.resolve-deploy-type.outputs.network }}
      NEXT_PUBLIC_NAMES_DAPP_FORBIDDEN_LIST: ${{ secrets.NAMES_DAPP_FORBIDDEN_LIST }}

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4.2.1

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Install Node.js
        uses: actions/setup-node@49933ea52887caea86642d1e84afbd3f7d682001 # v4.1.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add --global vercel@canary

      - name: Build and deploy
        run: |
          DEPLOY_TYPE="${{ needs.resolve-deploy-type.outputs.deploy_type }}"
          VERCEL_ENV="${{ needs.resolve-deploy-type.outputs.vercel_env }}"
          ALIAS="${{ needs.resolve-deploy-type.outputs.alias }}"
          VERCEL_FLAGS="--token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_SCOPE }}"

          vercel pull --yes --environment="$VERCEL_ENV" $VERCEL_FLAGS

          if [ "$DEPLOY_TYPE" = "prod" ]; then
            vercel build --prod $VERCEL_FLAGS
            vercel deploy --prod --prebuilt $VERCEL_FLAGS
          else
            vercel build --target="$VERCEL_ENV" $VERCEL_FLAGS
            URL=$(vercel deploy --prebuilt $VERCEL_FLAGS)
            if [ -n "$ALIAS" ]; then
              vercel alias set "$URL" "$ALIAS" $VERCEL_FLAGS
            fi
          fi
