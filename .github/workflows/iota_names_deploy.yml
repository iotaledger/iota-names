name: Deploy IOTA Names

on:
  workflow_dispatch:
    inputs:
      deploy_type:
        description: "Deploy type"
        required: true
        type: choice
        options:
          - staging
          - rc
          - production
  push:
    branches: [develop]
    paths:
      - "dapp/**"
      - "sdk/**"
      - "scripts/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/iota_names_deploy.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.deploy_type || 'staging' }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event.inputs.deploy_type != 'production' }}

jobs:
  resolve-deploy-type:
    runs-on: ubuntu-latest
    outputs:
      deploy_type: ${{ steps.resolve.outputs.deploy_type }}
      environment: ${{ steps.resolve.outputs.environment }}
      apps_backend_secret: ${{ steps.resolve.outputs.apps_backend_secret }}
    steps:
      - name: Resolve deploy type
        id: resolve
        run: |
          DEPLOY_TYPE="${{ inputs.deploy_type || 'staging' }}"
          case "$DEPLOY_TYPE" in
            staging)
              echo "deploy_type=staging" >> "$GITHUB_OUTPUT"
              echo "environment=Staging – names-dapp" >> "$GITHUB_OUTPUT"
              echo "apps_backend_secret=STAGING_APPS_BACKEND" >> "$GITHUB_OUTPUT"
              ;;
            rc)
              echo "deploy_type=rc" >> "$GITHUB_OUTPUT"
              echo "environment=RC – names-dapp" >> "$GITHUB_OUTPUT"
              echo "apps_backend_secret=RC_APPS_BACKEND" >> "$GITHUB_OUTPUT"
              ;;
            production)
              echo "deploy_type=production" >> "$GITHUB_OUTPUT"
              echo "environment=Production – names-dapp" >> "$GITHUB_OUTPUT"
              echo "apps_backend_secret=PROD_APPS_BACKEND" >> "$GITHUB_OUTPUT"
              ;;
          esac

  deploy:
    needs: resolve-deploy-type
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-deploy-type.outputs.environment }}

    permissions:
      contents: read

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.IOTA_NAMES_VERCEL_PROJECT_ID }}
      SENTRY_AUTH_TOKEN: ${{ secrets.NAMES_DAPP_SENTRY_AUTH_TOKEN }}
      NEXT_PUBLIC_APPS_BACKEND: ${{ secrets[needs.resolve-deploy-type.outputs.apps_backend_secret] }}
      NEXT_PUBLIC_NAMES_DAPP_CONFIG: ${{ secrets.NAMES_DAPP_CONFIG }}
      NEXT_PUBLIC_NAMES_DAPP_FORBIDDEN_LIST: ${{ secrets.NAMES_DAPP_FORBIDDEN_LIST }}

    strategy:
      fail-fast: false
      matrix:
        network: [mainnet, testnet]

    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add --global vercel@canary

      - name: Build and deploy
        env:
          NEXT_PUBLIC_NAMES_DAPP_DEFAULT_NETWORK: ${{ matrix.network }}
        run: |
          DEPLOY_TYPE="${{ needs.resolve-deploy-type.outputs.deploy_type }}"
          VERCEL_FLAGS="--token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_SCOPE }}"

          if [ "$DEPLOY_TYPE" = "production" ]; then
            if [ "${{ matrix.network }}" = "mainnet" ]; then
              VERCEL_ENV="production"
            else
              VERCEL_ENV="production-testnet"
            fi
          else
            VERCEL_ENV="preview"
          fi

          echo "Deploy type: ${DEPLOY_TYPE}, Network: ${{ matrix.network }}, Vercel environment: ${VERCEL_ENV}"

          vercel pull --yes --environment="$VERCEL_ENV" $VERCEL_FLAGS

          if [ "$DEPLOY_TYPE" = "production" ]; then
            if [ "${{ matrix.network }}" = "mainnet" ]; then
              vercel build --prod $VERCEL_FLAGS
              vercel deploy --prod --prebuilt $VERCEL_FLAGS
            else
              vercel build --target=production-testnet $VERCEL_FLAGS
              vercel deploy --prebuilt --target=production-testnet $VERCEL_FLAGS
            fi
          else
            vercel build $VERCEL_FLAGS
            URL=$(vercel deploy --prebuilt $VERCEL_FLAGS)

            ALIAS_PREFIX=""
            if [ "${{ matrix.network }}" = "testnet" ]; then
              ALIAS_PREFIX="testnet-"
            fi

            vercel alias set "$URL" "${ALIAS_PREFIX}iota-names-${DEPLOY_TYPE}-iota1.vercel.app" $VERCEL_FLAGS
          fi
