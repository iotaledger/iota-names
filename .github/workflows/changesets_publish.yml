name: Changesets Publish

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - experimental
          - next
          - latest

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.release_type }}

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Install Nodejs
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        if: github.event.inputs.release_type != 'latest'
        run: npm install -g npm@latest

      - name: Uninstall yarn # https://github.com/postmanlabs/postman-code-generators/issues/792
        if: github.event.inputs.release_type != 'latest'
        run: |
          YARN_PATH=$(which yarn || true)
          if [ -n "$YARN_PATH" ]; then
            echo "Removing Yarn at $YARN_PATH"
            sudo rm -f "$YARN_PATH"
          fi

      - name: Install dependencies
        if: github.event.inputs.release_type != 'latest'
        run: pnpm install --frozen-lockfile

      - name: Create snapshot versions
        if: github.event.inputs.release_type == 'experimental'
        run: pnpm changeset version --snapshot experimental

      - name: Build packages
        if: github.event.inputs.release_type != 'latest'
        run: |
          pnpm turbo run build --filter=./sdk

      - name: Publish packages
        if: github.event.inputs.release_type != 'latest'
        run: pnpm changeset publish --tag ${{ github.event.inputs.release_type }}

      - name: Promote next to latest
        if: github.event.inputs.release_type == 'latest'
        run: |
          PACKAGES=$(pnpm ls -r --depth -1 --json | jq -r '.[] | select(.private != true) | .name')
          for NAME in $PACKAGES; do
            NEXT_VERSION=$(npm view "$NAME" dist-tags.next 2>/dev/null || true)
            if [ -n "$NEXT_VERSION" ]; then
              echo "Promoting $NAME@$NEXT_VERSION from next to latest"
              npm dist-tag add "$NAME@$NEXT_VERSION" latest
            else
              echo "No next tag found for $NAME, skipping"
            fi
          done

      - name: Create summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Release type:** \`${{ github.event.inputs.release_type }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.release_type }}" = "experimental" ]; then
            echo "### Snapshot Packages" >> $GITHUB_STEP_SUMMARY
            echo "Install snapshot packages using:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "npm install @iota/iota-names-sdk@experimental" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ github.event.inputs.release_type }}" = "next" ]; then
            echo "### Next Packages" >> $GITHUB_STEP_SUMMARY
            echo "Install next packages using:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "npm install @iota/iota-names-sdk@next" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Production Release" >> $GITHUB_STEP_SUMMARY
            echo "Promoted \`next\` packages to \`latest\`." >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "npm install @iota/iota-names-sdk@latest" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
