name: Reusable Vercel Deploy (Docs)

on:
  # Reusable (callable) workflow
  workflow_call:
    inputs:
      VERCEL_ENVIRONMENT:
        type: string
        required: true
        description: "production or preview"
      DOCS_DIR:
        type: string
        required: true
        default: "documentation"
        description: "Path to docs app root"
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true
      VERCEL_SCOPE:
        required: true
      VERCEL_ALIAS:
        required: false

  # Manual dispatch (same inputs, read repo/org secrets directly)
  workflow_dispatch:
    inputs:
      VERCEL_ENVIRONMENT:
        description: "production or preview"
        required: true
        default: "preview"
      DOCS_DIR:
        description: "Path to docs app root"
        required: true
        default: "documentation"

env:
  # Works for both workflow_call and workflow_dispatch
  DOCS_DIR: ${{ inputs.DOCS_DIR }}

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}-${{ inputs.DOCS_DIR }}
  cancel-in-progress: ${{ inputs.VERCEL_ENVIRONMENT != 'production' }}

jobs:
  vercel-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ${{ env.DOCS_DIR }}/pnpm-lock.yaml

      - name: Enable corepack (pnpm)
        run: corepack enable

      # Pull project link & env into {DOCS_DIR}/.vercel/
      - name: Vercel pull
        working-directory: ${{ env.DOCS_DIR }}
        run: npx --yes vercel@latest pull --yes --environment="${{ inputs.VERCEL_ENVIRONMENT }}" --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install deps
        working-directory: ${{ env.DOCS_DIR }}
        run: pnpm install --frozen-lockfile

      # Remote build (no local .vercel/output / routes-manifest headaches)
      - name: Deploy (preview)
        if: ${{ inputs.VERCEL_ENVIRONMENT == 'preview' }}
        working-directory: ${{ env.DOCS_DIR }}
        run: npx --yes vercel@latest deploy --confirm --token="${{ secrets.VERCEL_TOKEN }}" --scope="${{ secrets.VERCEL_SCOPE }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy (production)
        if: ${{ inputs.VERCEL_ENVIRONMENT == 'production' }}
        working-directory: ${{ env.DOCS_DIR }}
        run: npx --yes vercel@latest deploy --prod --confirm --token="${{ secrets.VERCEL_TOKEN }}" --scope="${{ secrets.VERCEL_SCOPE }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
