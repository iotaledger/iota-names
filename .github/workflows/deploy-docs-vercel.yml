name: Deploy IOTA-Names Docs to Vercel

on:
  push:
    branches: [develop, devx/deploy-docs-vercel]
    paths:
      - "documentation/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "vercel environment: preview or production"
        required: true
        default: "preview"

env:
  DOCS_DIR: documentation
  VERCEL_ENV: ${{ github.event.inputs.environment || 'preview' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          run_install: false
          package_json_file: documentation/package.json

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Vercel CLI
        run: pnpm add --global vercel@latest

      - name: Install deps (docs)
        working-directory: ${{ env.DOCS_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Build (Vercel)
        run: |
          vercel build \
            --cwd "$DOCS_DIR" \
            --project "$IOTA_NAMES_DOCS_VERCEL_PROJECT_ID" \
            --scope "$VERCEL_SCOPE" \
            --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}
          IOTA_NAMES_DOCS_VERCEL_PROJECT_ID: ${{ secrets.IOTA_NAMES_DOCS_VERCEL_PROJECT_ID }}

      - name: Deploy (prebuilt)
        id: deploy
        run: |
          if [ "${{ env.VERCEL_ENV }}" = "production" ]; then
            vercel deploy --prebuilt --prod \
              --cwd "$DOCS_DIR" \
              --project "$IOTA_NAMES_DOCS_VERCEL_PROJECT_ID" \
              --scope "$VERCEL_SCOPE" \
              --token "$VERCEL_TOKEN"
          else
            vercel deploy --prebuilt \
              --cwd "$DOCS_DIR" \
              --project "$IOTA_NAMES_DOCS_VERCEL_PROJECT_ID" \
              --scope "$VERCEL_SCOPE" \
              --token "$VERCEL_TOKEN"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}
          IOTA_NAMES_DOCS_VERCEL_PROJECT_ID: ${{ secrets.IOTA_NAMES_DOCS_VERCEL_PROJECT_ID }}

      - name: Output URL
        run: echo "Deployed URL => (see deploy step logs for the final URL)"
