name: Reusable Vercel Deploy (Docs)

on:
  workflow_call:
    inputs:
      VERCEL_ENVIRONMENT:
        type: string
        required: true
        description: "production or preview"
      DOCS_DIR:
        type: string
        required: true
        default: "documentation"
        description: "Path to docs app root"
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true
      VERCEL_SCOPE:
        required: true
      VERCEL_ALIAS:
        required: false

  workflow_dispatch:
    inputs:
      VERCEL_ENVIRONMENT:
        description: "production or preview"
        required: true
        default: "preview"
      DOCS_DIR:
        description: "Path to docs app root"
        required: true
        default: "documentation"

env:
  DOCS_DIR: ${{ inputs.DOCS_DIR }}

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}-${{ inputs.DOCS_DIR }}
  cancel-in-progress: true

jobs:
  vercel-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      # Install PNPM first so setup-node pnpm cache can find it
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ${{ env.DOCS_DIR }}/pnpm-lock.yaml

      # Link project & pull env into {DOCS_DIR}/.vercel/
      - name: Vercel pull
        working-directory: ${{ env.DOCS_DIR }}
        run: npx --yes vercel@latest pull --yes --environment="${{ inputs.VERCEL_ENVIRONMENT }}" --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install deps
        working-directory: ${{ env.DOCS_DIR }}
        run: pnpm install --frozen-lockfile

      # --- Remote build deploy (no local .vercel/output needed) ---
      - name: Deploy (preview)
        if: ${{ inputs.VERCEL_ENVIRONMENT == 'preview' }}
        working-directory: ${{ env.DOCS_DIR }}
        run: npx --yes vercel@latest deploy --confirm --token="${{ secrets.VERCEL_TOKEN }}" --scope="${{ secrets.VERCEL_SCOPE }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy (production)
        if: ${{ inputs.VERCEL_ENVIRONMENT == 'production' }}
        working-directory: ${{ env.DOCS_DIR }}
        run: npx --yes vercel@latest deploy --prod --confirm --token="${{ secrets.VERCEL_TOKEN }}" --scope="${{ secrets.VERCEL_SCOPE }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # --- Safe alias gating (avoid secrets.* in if:) ---
      - name: Check alias presence
        id: alias_check
        shell: bash
        run: |
          if [ -n "${{ secrets.VERCEL_ALIAS }}" ]; then
            echo "has_alias=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_alias=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Alias
        if: ${{ steps.alias_check.outputs.has_alias == 'true' }}
        working-directory: ${{ env.DOCS_DIR }}
        env:
          VERCEL_ALIAS: ${{ secrets.VERCEL_ALIAS }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}
        run: npx --yes vercel@latest alias set "$VERCEL_ALIAS" --token="$VERCEL_TOKEN" --scope="$VERCEL_SCOPE"
