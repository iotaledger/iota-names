name: Deploy IOTA-Names Docs to Vercel

on:
  push:
    branches: [ develop, devx/deploy-docs-vercel ]
    paths:
      - "documentation/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "vercel environment: preview or production"
        required: true
        default: "preview"

env:
  DOCS_DIR: documentation
  VERCEL_ENVIRONMENT: ${{ github.event.inputs.environment || 'preview' }}
  VERCEL_TELEMETRY_DISABLED: "1"

jobs:
  vercel-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Link Vercel project locally (skip `vercel pull`)
      - name: Link Vercel project
        run: |
          set -e
          mkdir -p "${DOCS_DIR}/.vercel"
          cat > "${DOCS_DIR}/.vercel/project.json" <<JSON
          {
            "orgId": "${VERCEL_ORG_ID}",
            "projectId": "${IOTA_NAMES_DOCS_VERCEL_PROJECT_ID}"
          }
          JSON
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          IOTA_NAMES_DOCS_VERCEL_PROJECT_ID: ${{ secrets.IOTA_NAMES_DOCS_VERCEL_PROJECT_ID }}


      - name: Deploy (cloud build) and capture URL
        id: deploy
        run: |
          set -euo pipefail
          PROD_FLAG=""
          if [ "$VERCEL_ENVIRONMENT" = "production" ]; then PROD_FLAG="--prod"; fi

          TMP="$(mktemp)"
          npx --yes vercel@latest deploy --yes $PROD_FLAG \
            --token "${VERCEL_TOKEN}" \
            --scope "${VERCEL_SCOPE}" \
            --cwd "${DOCS_DIR}" \
            --json > "$TMP"

          URL=$(node -e "const fs=require('fs');const o=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));let u=o.url||o.alias||'';if(u&&!/^https?:\/\//.test(u))u='https://'+u;console.log(u);" "$TMP")

          echo "deployment_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}

      - name: Post deployment link
        if: always()
        run: |
          echo "### Vercel deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.deploy.outputs.deployment_url }}" >> "$GITHUB_STEP_SUMMARY"


      - name: Echo URL
        run: echo "URL => ${{ steps.deploy.outputs.deployment_url }}"
