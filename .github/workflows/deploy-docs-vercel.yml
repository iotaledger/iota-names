name: Deploy IOTA-Names Docs to Vercel

on:
  push:
    branches: [ develop, devx/deploy-docs-vercel ]
    paths:
      - "documentation/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "vercel environment: preview or production"
        required: true
        default: "preview"

env:
  DOCS_DIR: documentation
  VERCEL_ENVIRONMENT: ${{ github.event.inputs.environment || 'preview' }}

jobs:
  vercel-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: |
          corepack enable
          pnpm --version

      - name: Install deps (docs)
        working-directory: ${{ env.DOCS_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Vercel pull (link project & env)
        run: |
          pnpm dlx vercel@latest pull --yes \
            --environment=${{ env.VERCEL_ENVIRONMENT }} \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --cwd "${DOCS_DIR}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.IOTA_NAMES_DOCS_VERCEL_PROJECT_ID }}

      - name: Deploy (cloud build on Vercel)
        run: |
          if [ "${{ env.VERCEL_ENVIRONMENT }}" = "production" ]; then
            pnpm dlx vercel@latest deploy --prod \
              --token "${{ secrets.VERCEL_TOKEN }}" \
              --cwd "${DOCS_DIR}"
          else
            pnpm dlx vercel@latest deploy \
              --token "${{ secrets.VERCEL_TOKEN }}" \
              --cwd "${DOCS_DIR}"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
