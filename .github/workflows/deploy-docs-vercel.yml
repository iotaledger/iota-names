name: Deploy IOTA-Names Docs to Vercel

on:
  push:
    branches: [develop, devx/deploy-docs-vercel]
    paths:
      - "documentation/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "vercel environment: preview or production"
        required: true
        default: "preview"

env:
  DOCS_DIR: documentation
  VERCEL_ENVIRONMENT: ${{ github.event.inputs.environment || 'preview' }}
  VERCEL_TELEMETRY_DISABLED: "1"

jobs:
  vercel-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: |
          corepack enable
          pnpm --version

      - name: Install deps (docs)
        working-directory: ${{ env.DOCS_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Link Vercel project (no pull)
        run: |
          mkdir -p "${DOCS_DIR}/.vercel"
          printf '{"orgId":"%s","projectId":"%s"}' "${VERCEL_ORG_ID}" "${IOTA_NAMES_DOCS_VERCEL_PROJECT_ID}" > "${DOCS_DIR}/.vercel/project.json"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          IOTA_NAMES_DOCS_VERCEL_PROJECT_ID: ${{ secrets.IOTA_NAMES_DOCS_VERCEL_PROJECT_ID }}

      - name: Build locally to .vercel/output
        working-directory: ${{ env.DOCS_DIR }}
        run: pnpm dlx vercel@latest build --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Copy routes-manifest.json into Build Output API dir
        run: |
          set -e
          if [ -f "${DOCS_DIR}/.next/routes-manifest.json" ]; then
            mkdir -p "${DOCS_DIR}/.vercel/output"
            cp "${DOCS_DIR}/.next/routes-manifest.json" "${DOCS_DIR}/.vercel/output/routes-manifest.json"
          fi

      - name: Deploy prebuilt
        run: |
          if [ "${{ env.VERCEL_ENVIRONMENT }}" = "production" ]; then
            pnpm dlx vercel@latest deploy --prebuilt --prod \
              --token "${{ secrets.VERCEL_TOKEN }}" \
              --cwd "${DOCS_DIR}"
          else
            pnpm dlx vercel@latest deploy --prebuilt \
              --token "${{ secrets.VERCEL_TOKEN }}" \
              --cwd "${DOCS_DIR}"
          fi
