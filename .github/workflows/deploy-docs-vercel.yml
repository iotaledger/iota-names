name: Deploy IOTA-Names Docs to Vercel

on:
  push:
    branches: [develop, devx/deploy-docs-vercel]
    paths:
      - "documentation/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "vercel environment: preview or production"
        required: true
        default: "preview"

env:
  DOCS_DIR: documentation
  VERCEL_ENVIRONMENT: ${{ github.event.inputs.environment || 'preview' }}
  VERCEL_TELEMETRY_DISABLED: "1"

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ env.VERCEL_ENVIRONMENT != 'production' }}

jobs:
  vercel-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: documentation/pnpm-lock.yaml

      - name: Enable corepack
        run: corepack enable

      - name: Install deps (docs)
        working-directory: ${{ env.DOCS_DIR }}
        run: pnpm install --frozen-lockfile


      - name: Vercel pull (docs project)
        working-directory: ${{ env.DOCS_DIR }}
        run: npx --yes vercel@latest pull --yes \
              --environment="${{ env.VERCEL_ENVIRONMENT }}" \
              --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.IOTA_NAMES_DOCS_VERCEL_PROJECT_ID }}

      - name: Deploy (remote build)
        working-directory: ${{ env.DOCS_DIR }}
        run: |
          if [ "${{ env.VERCEL_ENVIRONMENT }}" = "production" ]; then
            npx --yes vercel@latest deploy --prod \
              --token="${{ secrets.VERCEL_TOKEN }}" \
              --scope="${{ secrets.VERCEL_SCOPE }}"
          else
            npx --yes vercel@latest deploy \
              --token="${{ secrets.VERCEL_TOKEN }}" \
              --scope="${{ secrets.VERCEL_SCOPE }}"
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.IOTA_NAMES_DOCS_VERCEL_PROJECT_ID }}
