name: Deploy IOTA-Names Docs to Vercel

on:
  push:
    branches: [ develop, devx/deploy-docs-vercel ]
    paths:
      - "documentation/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "vercel environment: preview or production"
        required: true
        default: "preview"

env:
  DOCS_DIR: documentation
  VERCEL_ENVIRONMENT: ${{ github.event.inputs.environment || 'preview' }}
  VERCEL_TELEMETRY_DISABLED: "1"

jobs:
  vercel-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      # Node for npx (no local deps install)
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Link Vercel project locally (skip `vercel pull`)
      - name: Link Vercel project
        run: |
          set -e
          mkdir -p "${DOCS_DIR}/.vercel"
          cat > "${DOCS_DIR}/.vercel/project.json" <<JSON
          {
            "orgId": "${VERCEL_ORG_ID}",
            "projectId": "${IOTA_NAMES_DOCS_VERCEL_PROJECT_ID}"
          }
          JSON
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          IOTA_NAMES_DOCS_VERCEL_PROJECT_ID: ${{ secrets.IOTA_NAMES_DOCS_VERCEL_PROJECT_ID }}

      # Cloud build on Vercel (no local build)
      - name: Deploy (cloud build)
        run: |
          if [ "${{ env.VERCEL_ENVIRONMENT }}" = "production" ]; then
            npx --yes vercel@latest deploy --yes --prod \
              --token "${{ secrets.VERCEL_TOKEN }}" \
              --scope "${{ secrets.VERCEL_SCOPE }}" \
              --cwd "${DOCS_DIR}"
          else
            npx --yes vercel@latest deploy --yes \
              --token "${{ secrets.VERCEL_TOKEN }}" \
              --scope "${{ secrets.VERCEL_SCOPE }}" \
              --cwd "${DOCS_DIR}"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
