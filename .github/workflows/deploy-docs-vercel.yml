name: Deploy IOTA-Names Docs to Vercel

on:
  push:
    branches: [ develop, devx/deploy-docs-vercel ]
    paths:
      - "documentation/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "vercel environment: preview or production"
        required: true
        default: "preview"

env:
  DOCS_DIR: documentation
  VERCEL_ENV: ${{ github.event.inputs.environment || 'preview' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (pnpm via packageManager)
        run: |
          corepack enable
          pnpm --version

      - name: Install deps (docs)
        working-directory: ${{ env.DOCS_DIR }}
        run: pnpm install --frozen-lockfile

      # Link project & fetch env/config into .vercel/ using ENV VARS
      - name: Vercel pull
        run: |
          pnpm dlx vercel@latest pull --yes \
            --environment=${{ env.VERCEL_ENV == 'production' && 'production' || 'preview' }} \
            --token "$VERCEL_TOKEN" \
            --cwd "$DOCS_DIR"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.IOTA_NAMES_DOCS_VERCEL_PROJECT_ID }}

      - name: Build (Vercel)
        run: |
          pnpm dlx vercel@latest build \
            --token "$VERCEL_TOKEN" \
            --cwd "$DOCS_DIR"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy (prebuilt)
        id: deploy
        run: |
          if [ "${{ env.VERCEL_ENV }}" = "production" ]; then
            pnpm dlx vercel@latest deploy --prebuilt --prod \
              --token "$VERCEL_TOKEN" \
              --cwd "$DOCS_DIR"
          else
            pnpm dlx vercel@latest deploy --prebuilt \
              --token "$VERCEL_TOKEN" \
              --cwd "$DOCS_DIR"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Output URL
        run: echo "Deployed URL => (see deploy step logs for the final URL)"
