name: Deploy IOTA-Names Docs to Vercel

on:
  push:
    branches: [ develop, devx/deploy-docs-vercel ]
    paths:
      - "documentation/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "vercel environment: preview or production"
        required: true
        default: "preview"

env:
  DOCS_DIR: documentation
  VERCEL_ENVIRONMENT: ${{ github.event.inputs.environment || 'preview' }}
  VERCEL_TELEMETRY_DISABLED: "1"

jobs:
  vercel-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (pnpm from packageManager)
        run: |
          corepack enable
          pnpm --version

      - name: Install deps (inside /documentation)
        working-directory: ${{ env.DOCS_DIR }}
        run: pnpm install --frozen-lockfile

      # Link project SETTINGS into documentation/.vercel/ (required for `vercel build`)
      - name: Vercel pull (writes documentation/.vercel/project.json)
        run: |
          pnpm dlx vercel@latest pull --yes \
            --environment="${{ env.VERCEL_ENVIRONMENT }}" \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --cwd "${DOCS_DIR}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.IOTA_NAMES_DOCS_VERCEL_PROJECT_ID }}

      # Build locally *from inside /documentation* to .vercel/output
      - name: Build locally (cwd = /documentation)
        run: |
          pnpm dlx vercel@latest build \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --cwd "${DOCS_DIR}"

      # Ensure the routes manifest is present in Build Output
      - name: Copy routes-manifest.json into Build Output
        run: |
          set -e
          if [ -f "${DOCS_DIR}/.next/routes-manifest.json" ]; then
            mkdir -p "${DOCS_DIR}/.vercel/output"
            cp "${DOCS_DIR}/.next/routes-manifest.json" "${DOCS_DIR}/.vercel/output/routes-manifest.json"
          fi

      # Deploy the *prebuilt* bundle from /documentation
      - name: Deploy prebuilt (cwd = /documentation)
        run: |
          if [ "${{ env.VERCEL_ENVIRONMENT }}" = "production" ]; then
            pnpm dlx vercel@latest deploy --prebuilt --prod \
              --token "${{ secrets.VERCEL_TOKEN }}" \
              --cwd "${DOCS_DIR}"
          else
            pnpm dlx vercel@latest deploy --prebuilt \
              --token "${{ secrets.VERCEL_TOKEN }}" \
              --cwd "${DOCS_DIR}"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
