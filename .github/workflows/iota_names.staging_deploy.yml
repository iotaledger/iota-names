name: Staging Deploy for IOTA Names

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - "dapp/**"
      - ".github/workflows/iota_names.staging_deploy.yml"
      - ".github/workflows/vercel_app_deploy.yml"

jobs:
  deploy-staging:
    uses: ./.github/workflows/vercel_app_deploy.yml
    with:
      VERCEL_ENVIRONMENT: preview
      NAMES_DAPP_DEFAULT_NETWORK: devnet
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.IOTA_NAMES_VERCEL_PROJECT_ID }}
      VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}
      NAMES_DAPP_CONFIG: ${{ secrets.NAMES_DAPP_CONFIG }}
      VERCEL_ALIAS: ${{ secrets.NAMES_DAPP_STAGING_ALIAS }}
      NAMES_DAPP_FORBIDDEN_LIST: ${{ secrets.NAMES_DAPP_FORBIDDEN_LIST }}
