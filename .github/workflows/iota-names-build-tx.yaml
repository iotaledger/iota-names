---
name: Build IOTA-Names TX

on:
  workflow_dispatch:
    inputs:
      transaction_type:
        description: "select transaction type to create"
        type: choice
        options:
          - Profits to Treasury
          - Transfer Reserved Names
          - Transfer Admin Caps
          - Upgrade IOTA-Names
          - Authorize Packages
      iota_tools_image:
        description: "image reference of iota_tools"
        default: "iotaledger/iota-tools:mainnet"
      rpc:
        description: "RPC url"
        required: true
        default: "https://api.mainnet.iota.cafe:443"
        type: string
      gas_object_id:
        description: "object id to get gas from for multisig transaction"
        required: true
        type: string
        default: "0xae841028e9c704badbeb0f3f837b371f663bf647e6f9c984ce47284869a8754e"

jobs:
  iota_names:
    name: IOTA-Names create tx
    runs-on: ubuntu-latest

    steps:
      - name: Selected transaction type
        run: |
          echo ${{ inputs.transaction_type }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

      - name: Install IOTA using Homebrew
        run: brew install iotaledger/tap/iota

      - name: YAML Setup
        run: |
          iota client --yes new-env --rpc ${{ inputs.rpc }} --alias network
          iota client switch --env network

      - name: NPM BUILD TX Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Do a global PNPM install
        run: |
          npm install -g pnpm

      - name: Set up working directory
        run: |
          pnpm install

      - name: Profits to Treasury
        if: ${{ inputs.transaction_type == 'Profits to Treasury' }}
        env:
          NODE_ENV: production
          GAS_OBJECT: ${{ inputs.gas_object_id }}
          NETWORK: mainnet
          ORIGIN: gh_action
        run: |
          cd scripts && pnpm withdraw:profits

      - name: Transfer Reserved Names
        if: ${{ inputs.transaction_type == 'Transfer Reserved Names' }}
        env:
          NODE_ENV: production
          GAS_OBJECT: ${{ inputs.gas_object_id }}
          NETWORK: mainnet
          ORIGIN: gh_action
        run: |
          cd scripts && pnpm transfer::names

      - name: Transfer Admin Caps
        if: ${{ inputs.transaction_type == 'Transfer Admin Caps' }}
        env:
          NODE_ENV: production
          GAS_OBJECT: ${{ inputs.gas_object_id }}
          NETWORK: mainnet
          ORIGIN: gh_action
        run: |
          cd scripts && pnpm transfer::caps

      - name: Upgrade IOTA-Names
        if: ${{ inputs.transaction_type == 'Upgrade IOTA-Names' }}
        env:
          NODE_ENV: production
          GAS_OBJECT: ${{ inputs.gas_object_id }}
          NETWORK: mainnet
          ORIGIN: gh_action
          RPC_URL: ${{ inputs.rpc }}
        run: |
          cd scripts && pnpm ts-node transactions/main-package-upgrade.ts

      - name: Authorize Packages
        if: ${{ inputs.transaction_type == 'Authorize Packages' }}
        env:
          NODE_ENV: production
          GAS_OBJECT: ${{ inputs.gas_object_id }}
          NETWORK: mainnet
          ORIGIN: gh_action
          RPC_URL: ${{ inputs.rpc }}
        run: |
          cd scripts && pnpm ts-node transactions/mainnet-setup.ts

      - name: Show Transaction Data (To sign)
        run: |
          cat scripts/tx/tx-data.txt

      - name: Upload Transaction Artifact
        uses: actions/upload-artifact@v4
        with:
          name: transaction-data
          path: scripts/tx
