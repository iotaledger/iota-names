name: Typescript

on:
  pull_request:
    paths:
      - ".github/workflows/typescript.yaml"
      - "packages/**"
      - "scripts/**"
      - "build-scripts/**"
      - "sdk/**"
      - ".eslintrc.cjs"
      - "prettier.config.cjs"
      - "dapp/**"
  push:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_and_lint:
    name: TS Build / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20

      - name: Do a global PNPM install
        run: |
          npm install -g pnpm

      - name: Install Dependencies
        run: |
          pnpm install

      - name: Run pnpm build
        run: |
          pnpm turbo build

      - name: Run pnpm lint
        run: |
          pnpm lint

  sdk_test:
    name: SDK Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespw
          POSTGRES_DB: iota_indexer
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

      - name: Install IOTA using Homebrew
        run: brew install iotaledger/tap/iota

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20

      - name: Do a global PNPM install
        run: |
          npm install -g pnpm

      - name: Install Dependencies
        run: |
          pnpm install

      - name: Build SDK
        run: |
          pnpm sdk build

      - name: Prepare local network & run SDK tests
        env:
          IS_CI_JOB: true
          NETWORK: localnet
        run: |
          iota start --with-faucet --committee-size 2 --with-indexer --with-graphql --force-regenesis --epoch-duration-ms 120000 > /dev/null 2>&1 &
          sleep 10

          iota client --yes new-env --alias localnet --rpc http://127.0.0.1:9000 --graphql http://127.0.0.1:9125
          iota client switch --env localnet
          iota client faucet
          sleep 5

          cd scripts
          export NETWORK=localnet
          pnpm ts-node init/init.ts localnet
          pnpm ts-node tests/register-name.ts
          sleep 5

          cat ./package-info/localnet.json

          cd ../sdk
          VITE_IOTA_BIN="iota" pnpm test:e2e
