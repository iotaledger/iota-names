name: Typescript

on:
  pull_request:
    paths:
      - ".github/workflows/typescript.yaml"
      - "packages/**"
      - "scripts/**"
      - "build-scripts/**"
      - "sdk/**"
      - ".eslintrc.cjs"
      - "prettier.config.cjs"
      - "dapp/**"
  push:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_and_lint:
    name: TS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20

      - name: Do a global PNPM install
        run: |
          npm install -g pnpm

      - name: Install Dependencies
        run: |
          pnpm install

      - name: Build
        run: |
          pnpm dapp build

      - name: Run pnpm lint
        run: |
          pnpm lint

  sdk_test:
    name: SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

      - name: Install IOTA using Homebrew
        run: brew install iotaledger/tap/iota

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20

      - name: Do a global PNPM install
        run: |
          npm install -g pnpm

      - name: Install Dependencies
        run: |
          pnpm install

      - name: Prepare local network & run SDK tests
        env:
          IS_CI_JOB: true
          NETWORK: localnet
        run: |
          iota start --with-faucet --force-regenesis --epoch-duration-ms 120000 > /dev/null 2>&1 &
          cd sdk
          VITE_IOTA_BIN="iota" pnpm test:e2e
          sleep 5 # wait some time for the network
          iota client --yes new-env --alias localnet --rpc http://127.0.0.1:9000
          iota client switch --env localnet
          iota client faucet
          cd ../scripts
          export NETWORK=localnet
          pnpm ts-node init/init.ts localnet
          pnpm ts-node tests/register-name.ts
