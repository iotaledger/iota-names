name: Typescript

on:
  pull_request:
    paths:
      - ".github/workflows/typescript.yml"
      - ".github/scripts/download-iota-binary.sh"
      - ".github/scripts/setup-e2e-network.sh"
      - "packages/**"
      - "scripts/**"
      - "build-scripts/**"
      - "sdk/**"
      - ".eslintrc.cjs"
      - "prettier.config.cjs"
      - "dapp/**"
      - "names-display/**"
  push:
    branches: [develop]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/develop' }}

jobs:
  build-and-lint:
    name: TS Build / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 1

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 20

      - name: Do a global PNPM install
        run: |
          npm install -g pnpm

      - name: Install Dependencies
        run: |
          pnpm install

      - name: Run pnpm build
        env:
          NEXT_PUBLIC_NAMES_DAPP_DEFAULT_NETWORK: "devnet"
          NEXT_PUBLIC_NAMES_DAPP_CONFIG: |
            {
              "devnet":{
                  "network": "devnet",
                  "namesDisplayUrl": "http://localhost",
                  "indexerUrl": "http://localhost:3030",
                  "baseUrl": "http://localhost:3005"
              }
            }
        run: |
          pnpm turbo build

      - name: Run pnpm lint
        run: |
          pnpm lint

  sdk-test:
    name: SDK Tests
    if: (github.event_name == 'workflow_call') || (github.event_name == 'push') || (github.event.pull_request.draft == false || contains(github.event.pull_request.body, '[run-ci]'))
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespw
          POSTGRES_DB: iota_indexer
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 1

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 20

      - name: Do a global PNPM install
        run: |
          npm install -g pnpm

      - name: Install Dependencies
        run: |
          pnpm install

      - name: Typecheck Sdk
        run: pnpm -F @iota/iota-names-sdk typecheck
        working-directory: ./

      - name: Build SDK
        run: |
          pnpm sdk build

      - name: Download IOTA Binary
        run: |
          .github/scripts/download-iota-binary.sh

      - name: Prepare local network & run SDK tests
        env:
          IS_CI_JOB: true
          NETWORK: localnet
        run: |
          iota-localnet start --with-faucet --faucet-amount 100000000000000 --with-indexer --with-graphql --force-regenesis --epoch-duration-ms 120000 > /dev/null 2>&1 &
          sleep 10

          iota client --yes new-env --alias localnet --rpc http://127.0.0.1:9000 --graphql http://127.0.0.1:9125
          iota client switch --env localnet
          iota client faucet
          sleep 5

          cd scripts
          export NETWORK=localnet
          pnpm ts-node init/init.ts localnet
          pnpm ts-node tests/register-name.ts
          sleep 5

          cat ./package-info/localnet.json

          cd ../sdk
          VITE_IOTA_BIN="iota" pnpm test:e2e

  dapp-e2e-test:
    name: Run dapp E2E Tests
    if: (github.event_name == 'workflow_call') || (github.event_name == 'push') || (github.event.pull_request.draft == false || contains(github.event.pull_request.body, '[run-ci]'))
    runs-on: ubuntu-latest
    env:
      ADMIN_MNEMONIC: "say credit unknown distance behave outside convince embrace planet ginger phrase isolate"
      NEXT_PUBLIC_NAMES_DAPP_DEFAULT_NETWORK: localnet
      NEXT_PUBLIC_NAMES_DAPP_CONFIG: |
        {
          "localnet": {
            "network": "localnet",
            "namesDisplayUrl": "http://localhost",
            "indexerUrl": "http://localhost:3030",
            "baseUrl": "http://localhost:3005"
          }
        }
    defaults:
      run:
        working-directory: ./dapp
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 1

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 20

      - name: Start Postgres
        run: |
          docker run -d --name postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgrespw \
            -e POSTGRES_DB=iota_indexer \
            -e POSTGRES_HOST_AUTH_METHOD=trust \
            -p 5432:5432 \
            postgres:15 \
            postgres -c max_connections=1000
          until docker exec postgres pg_isready; do sleep 1; done
        working-directory: ./

      - name: Do a global PNPM install
        run: |
          npm install -g pnpm

      - name: Install Dependencies
        run: |
          pnpm install
        working-directory: ./

      - name: Download IOTA Wallet Extension
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run test:prepare

      - name: Install Playwright Browsers
        run: |
          pnpm run playwright:install

      - name: Setup E2E Network
        working-directory: ./
        env:
          DB_URL: "postgres://postgres:postgrespw@localhost:5432/iota_indexer"
        run: |
          .github/scripts/setup-e2e-network.sh

      - name: Wait for indexer to catch up
        run: |
          sleep 45
      - name: Inject localnet config and start indexer
        working-directory: ./
        run: |
          cd dapp
          pnpm inject-localnet

          cd ..
          INDEXER_ENV_FILE="$(mktemp)"
          cd scripts && pnpm run envsForIndexer localnet bash "$INDEXER_ENV_FILE" && sed -i 's/^export //' "$INDEXER_ENV_FILE" && cd ..

          docker pull ghcr.io/iotaledger/iota-names/iota-names-indexer:latest
          docker rm -f localnet-iota-names-indexer || true
          docker run -d \
            --name localnet-iota-names-indexer \
            --env-file "$INDEXER_ENV_FILE" \
            --add-host host.docker.internal:host-gateway \
            -p 3030:3030 \
            -p 9189:9189 \
            ghcr.io/iotaledger/iota-names/iota-names-indexer:latest \
            start \
            --node-url=http://host.docker.internal:9000 \
            --checkpoint-url=http://host.docker.internal:9000 \
            --reset-metrics

      - name: Build and run E2E tests
        working-directory: ./
        run: |
          pnpm dapp build
          cd dapp
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" -- env ADMIN_MNEMONIC="$ADMIN_MNEMONIC" pnpm run test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: playwright-report
          path: dapp/playwright-report/
          retention-days: 7

      - name: Upload Network Logs
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: network-logs
          path: |
            iota-node.log
            indexer-writer.log
            indexer-reader.log
            graphql.log
          retention-days: 7

  names-display-test:
    name: Names Display Tests
    if: (github.event_name == 'workflow_call') || (github.event_name == 'push') || (github.event.pull_request.draft == false || contains(github.event.pull_request.body, '[run-ci]'))
    runs-on: self-hosted-x64
    defaults:
      run:
        working-directory: ./names-display
    steps:
      - name: checkout code repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Install Nodejs
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./

      - name: Build sdk
        run: pnpm --filter @iota/iota-names-sdk run build

      - name: Build names-display service
        run: pnpm --filter names-display run build
        working-directory: ./

      - name: Run names-display tests
        run: pnpm --filter names-display run test
        working-directory: ./
